name: Publish to MCP Registry

on:
  push:
    branches: [main]
    paths: ['server.json']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to MCP Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to MCP Registry
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SERVER_NAME="io.github.dushyant30suthar/endiagram-mcp"
          ENCODED_NAME=$(printf '%s' "$SERVER_NAME" | sed 's|/|%2F|g')

          # Get OIDC token from GitHub Actions
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=mcp-registry" | jq -r '.value')

          # Exchange OIDC token for registry JWT
          AUTH_RESPONSE=$(curl -s -X POST "https://registry.modelcontextprotocol.io/v0.1/auth/github-oidc" \
            -H "Content-Type: application/json" \
            -d "{\"oidc_token\": \"$OIDC_TOKEN\"}")

          REGISTRY_JWT=$(echo "$AUTH_RESPONSE" | jq -r '.registry_token // .token // empty')

          if [ -z "$REGISTRY_JWT" ]; then
            echo "::error::Failed to get MCP Registry JWT"
            echo "Auth response: $AUTH_RESPONSE"
            exit 1
          fi

          # Publish new version to MCP Registry
          HTTP_STATUS=$(curl -s -o /tmp/registry-response.json -w "%{http_code}" \
            -X PUT "https://registry.modelcontextprotocol.io/v0.1/servers/${ENCODED_NAME}/versions/${VERSION}" \
            -H "Authorization: Bearer $REGISTRY_JWT" \
            -H "Content-Type: application/json" \
            -d @server.json)

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "Published to MCP Registry: ${SERVER_NAME}@${VERSION}"
          else
            echo "::error::MCP Registry publish returned HTTP $HTTP_STATUS"
            cat /tmp/registry-response.json
            exit 1
          fi
